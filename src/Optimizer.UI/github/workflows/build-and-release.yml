name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        # Ajusta la ruta si tu proyecto/csproj está en otro lugar
        run: dotnet publish ./src/Optimizer.UI/ -c Release -r win-x64 --self-contained true -o ./publish

      - name: Pack release
        shell: pwsh
        run: |
          $zipName = "Optimizer-$env:GITHUB_REF_NAME.zip"
          if (Test-Path $zipName) { Remove-Item $zipName }
          Compress-Archive -Path ./publish/* -DestinationPath $zipName

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Optimizer-${{ github.ref_name }}.zip
          asset_name: Optimizer-${{ github.ref_name }}.zip
          asset_content_type: application/zip
